<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episkevi Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --ink:#F0EDE6; --muted:#8A8799; --line:rgba(201,168,76,.16); --paper:#111118; --wash:#0A0A0F;
  --navy:#1A1A24; --navy2:#22222F; --amber:#C9A84C; --amber-ink:#0A0A0F;
  --teal:#C9A84C; --teal2:#E8D49A; --teal-wash:rgba(201,168,76,.10); --red:#E74C3C; --red-wash:rgba(231,76,60,.12);
  --green:#2ECC71; --green-wash:rgba(46,204,113,.12); --accent:#4E9FF5; --accent2:#7B5CF0; --warning:#F39C12;
  --shadow:0 8px 40px rgba(0,0,0,.5); --shadow-gold:0 0 40px rgba(201,168,76,.15);
  --display:"Playfair Display",serif; --mono:"DM Mono",monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--wash);color:var(--ink);font-family:"DM Sans",sans-serif;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
h1,h2,h3{font-family:var(--display);letter-spacing:-.01em;font-weight:700}
.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--gold-dark,#8B6914);border-radius:4px}

/* ---- top bar ---- */
.top{position:sticky;top:0;z-index:40;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(10,10,15,.9);backdrop-filter:blur(20px)}
.topin{max-width:1280px;margin:auto;padding:13px 22px;display:flex;gap:16px;align-items:center;justify-content:space-between}
.brand{display:flex;gap:10px;align-items:center;font-family:var(--display);font-size:26px;font-weight:900;cursor:pointer;letter-spacing:-1px}
.brand{background:linear-gradient(135deg,var(--teal),var(--teal2));-webkit-background-clip:text;background-clip:text;color:transparent}
.mark{width:38px;height:38px;display:grid;place-items:center;border-radius:10px;background:linear-gradient(135deg,#8B6914,var(--teal));color:#0A0A0F;font-family:var(--mono);font-weight:700;font-size:13px;box-shadow:0 4px 16px rgba(201,168,76,.35)}
.tabs{display:flex;gap:4px;padding:5px;border:1px solid rgba(255,255,255,.06);border-radius:999px;background:var(--paper)}
.tabs button{border:0;border-radius:999px;background:transparent;color:var(--muted);font-weight:600;min-height:36px;padding:0 16px;font-size:14px;transition:all .2s ease;font-family:"DM Sans",sans-serif}
.tabs button.active{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#0A0A0F;font-weight:700}
.sync{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;background:#4A4860}
.dot.live{background:var(--green);box-shadow:0 0 0 4px var(--green-wash);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.screen{display:none}
.screen.active{display:block}
.wrap{max-width:1280px;margin:auto;padding:26px 22px 60px}

/* ---- landing / role picker ---- */
.dispatchHero{border-radius:22px;background:var(--paper);color:var(--ink);padding:clamp(30px,5vw,58px);position:relative;overflow:hidden;border:1px solid rgba(201,168,76,.15)}
.dispatchHero::before{content:"";position:absolute;top:-200px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,.10) 0%,transparent 70%);pointer-events:none}
.dispatchHero>*{position:relative}
.eyebrow{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);background:rgba(201,168,76,.08);display:inline-flex;align-items:center;gap:8px;padding:7px 16px 7px 26px;border-radius:999px;border:1px solid rgba(201,168,76,.18);position:relative}
.eyebrow::before{content:"";position:absolute;left:12px;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.dispatchHero h1{font-size:clamp(34px,5.2vw,58px);line-height:1.08;margin:18px 0 12px;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 50%,var(--teal) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;max-width:700px}
.dispatchHero .lead{font-size:17px;line-height:1.7;color:var(--muted);max-width:520px;font-family:"DM Sans",sans-serif;font-weight:300}
.liveStrip{display:flex;gap:32px;flex-wrap:wrap;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.08)}
.liveStrip div strong{display:block;font-family:var(--display);font-size:28px;font-weight:700;color:var(--teal)}
.liveStrip div span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600}

.ticketRow{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:26px}
.roleRow{grid-template-columns:repeat(2,1fr)}
.roleRow .ticket{padding:34px 30px 32px;text-align:left}
.roleRow .tIcon{font-size:40px;margin-bottom:14px;width:auto;height:auto;background:none;box-shadow:none;display:block}
.staffLink{text-align:center;margin-top:26px}
.staffLink a{color:var(--muted);font-weight:600;font-size:13px;text-decoration:none;border-bottom:1px dashed rgba(255,255,255,.15)}
.staffLink a:hover{color:var(--teal)}
.ticket{position:relative;background:var(--paper);border:1px solid rgba(201,168,76,.15);border-radius:22px;padding:26px 24px 30px;transition:all .3s ease;cursor:pointer;overflow:hidden}
.ticket::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity .3s}
.ticket:hover{border-color:rgba(201,168,76,.5);transform:translateY(-6px);box-shadow:var(--shadow-gold)}
.ticket:hover::after{opacity:1}
.ticket.cust .code{color:var(--teal)}
.ticket.work .code{color:var(--accent2)}
.ticket.adm .code{color:var(--accent)}
.tIcon{width:44px;height:44px;border-radius:12px;background:var(--navy);color:var(--teal);display:grid;place-items:center;font-weight:700;font-family:var(--mono);font-size:14px;margin-bottom:16px}
.ticket h3{font-size:26px;margin:0 0 8px;font-weight:700;letter-spacing:-.5px;color:var(--ink)}
.code{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;letter-spacing:.15em;margin-bottom:10px;display:block;text-transform:uppercase}
.ticket p{color:var(--muted);line-height:1.6;font-size:14.5px;margin:0 0 20px;min-height:64px;font-weight:300}
.barcode{display:none}
.stamp{display:none}
.ticket .go{display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14.5px;color:var(--teal)}
.ticket .go em{font-style:normal;background:var(--navy);border-radius:999px;padding:7px 14px;font-size:15px;color:var(--ink)}

.panel{margin-top:24px;padding:24px;border:1px solid rgba(255,255,255,.06);border-radius:20px;background:var(--paper);box-shadow:0 8px 30px rgba(0,0,0,.35)}
.head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.title{font-size:22px;font-weight:700;margin:0;letter-spacing:-.5px;color:var(--ink)}
.sub,.muted{color:var(--muted);line-height:1.5;font-size:14px}
.btn{min-height:44px;border:0;border-radius:999px;padding:0 20px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-size:14.5px;transition:all .25s ease;font-family:"DM Sans",sans-serif;letter-spacing:.2px}
.btn:hover{transform:translateY(-2px)}
.primary{background:linear-gradient(135deg,var(--teal),#8B6914);color:#0A0A0F;font-weight:700;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.primary:hover{box-shadow:0 8px 30px rgba(201,168,76,.4)}
.dark{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.dark:hover{background:rgba(201,168,76,.1)}
.amberBtn{background:var(--teal2);color:#0A0A0F}
.soft{background:var(--navy);color:var(--teal);border:1px solid rgba(201,168,76,.2)}
.soft:hover{background:var(--teal);color:#0A0A0F}
.danger{background:var(--red-wash);color:var(--red);border:1px solid rgba(231,76,60,.3)}
.warn{background:rgba(243,156,18,.12);color:var(--warning);border:1px solid rgba(243,156,18,.3)}
.light{background:var(--navy);border:1px solid rgba(255,255,255,.08);color:var(--ink)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.grid2{display:grid;grid-template-columns:300px 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.field{margin-bottom:12px}
.field label{display:block;margin-bottom:7px;color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.field input,.field select,.field textarea{width:100%;min-height:46px;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:11px 15px;outline:0;background:var(--navy);color:var(--ink)}
.field textarea{min-height:80px;resize:vertical}
.field input::placeholder,.field textarea::placeholder{color:#4A4860}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
.chips{display:grid;grid-template-columns:repeat(6,minmax(112px,1fr));gap:12px}
.chip{min-height:90px;border:1px solid rgba(255,255,255,.06);border-radius:14px;background:var(--paper);text-align:left;padding:14px;transition:all .25s ease;color:var(--ink)}
.chip:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px)}
.chip.active{background:rgba(201,168,76,.08);border-color:var(--teal)}
.icon{width:32px;height:32px;border-radius:8px;background:var(--navy);color:var(--teal);display:grid;place-items:center;font-size:11px;font-weight:700;margin-bottom:9px;font-family:var(--mono)}
.chip.active .icon{background:var(--teal);color:#0A0A0F}
.worker{min-height:320px;padding:18px;display:flex;flex-direction:column;border-radius:20px}
.row{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8B6914,var(--accent2));color:#fff;overflow:hidden;display:grid;place-items:center;font-weight:700;flex:0 0 auto;font-family:var(--display);border:2px solid rgba(201,168,76,.2)}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-weight:600;color:var(--ink)}
.meta{font-size:13px;color:var(--muted);line-height:1.5}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin:13px 0}
.tag{min-height:25px;border-radius:999px;padding:4px 11px;background:var(--navy);color:var(--muted);font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.06);letter-spacing:.02em}
.green{background:var(--green-wash);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.amber{background:rgba(243,156,18,.14);color:var(--warning);border:1px solid rgba(243,156,18,.3)}
.blue{background:rgba(78,159,245,.14);color:var(--accent);border:1px solid rgba(78,159,245,.3)}
.exp{flex:1;color:var(--muted);line-height:1.55;font-size:14px;font-weight:300}
.foot{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:15px}
.price{font-size:20px;font-weight:700;color:var(--teal);font-family:var(--display)}
.drawer{padding:15px;display:grid;gap:8px;align-content:start;border:1px solid rgba(255,255,255,.06);border-radius:20px;background:var(--paper)}
.menuBtn{width:100%;justify-content:flex-start}
.list{display:grid;gap:12px}
.card{padding:16px;border:1px solid rgba(255,255,255,.06);border-radius:16px;background:var(--paper)}
.statusLine{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{padding:16px;border:1px solid rgba(255,255,255,.06);border-radius:14px;background:var(--paper)}
.stat strong{display:block;font-size:24px;font-family:var(--display);font-weight:700;color:var(--teal)}
.stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.empty{border:1px dashed rgba(255,255,255,.12);border-radius:16px;padding:26px;text-align:center;color:var(--muted);font-weight:500}
.chatBox{height:250px;overflow:auto;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:12px;background:var(--wash)}
.chatMsg{margin-bottom:10px;padding:10px 14px;border-radius:14px;background:var(--navy);color:var(--ink)}
.chatMsg.me{background:rgba(201,168,76,.12);color:var(--teal2)}
.hamb{display:none}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:200;display:none;max-width:min(92vw,580px);border-radius:999px;background:var(--paper);border:1px solid rgba(201,168,76,.25);color:var(--ink);padding:13px 20px;font-weight:600;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.toast.show{display:block}

/* live map + tracking */
.mapBox{height:320px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.mapBoxSm{height:190px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.trackHead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.trackStats{display:flex;gap:18px}
.trackStats div strong{display:block;font-family:var(--display);font-size:20px;font-weight:700;color:var(--teal)}
.trackStats div span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.vanIcon{background:var(--teal);color:#0A0A0F;border-radius:50%;width:30px;height:30px;display:grid;place-items:center;font-size:15px;border:2px solid #0A0A0F;box-shadow:0 3px 8px rgba(0,0,0,.5)}
.pinIcon{background:var(--red);color:#fff;border-radius:50% 50% 50% 0;width:26px;height:26px;transform:rotate(-45deg);display:grid;place-items:center;border:2px solid #0A0A0F;box-shadow:0 3px 8px rgba(0,0,0,.5)}
.pinIcon span{transform:rotate(45deg);font-size:12px}
.shareBar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-radius:16px;background:var(--navy);border:1px solid rgba(201,168,76,.15);color:var(--ink);margin-bottom:16px;flex-wrap:wrap}
.shareBar .left{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:46px;height:26px;border-radius:999px;background:rgba(255,255,255,.12);border:0;flex:0 0 auto}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .18s ease}
.toggle.on{background:var(--green)}
.toggle.on::after{transform:translateX(20px)}

.modalCover{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.75);backdrop-filter:blur(8px)}
.modalCover.open{display:flex}
.modal{width:min(860px,100%);max-height:92vh;overflow:auto;border:1px solid rgba(201,168,76,.2);border-radius:22px;background:var(--paper);box-shadow:var(--shadow);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modalHead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.06)}
.modalBody{padding:22px}
.summary{border-radius:14px;background:var(--navy);border:1px solid rgba(201,168,76,.15);color:var(--ink);padding:18px}
.sum{display:flex;justify-content:space-between;padding:8px 0;color:var(--muted);font-size:14px}
.sum.total{border-top:1px solid rgba(255,255,255,.1);margin-top:8px;padding-top:14px;color:var(--ink);font-weight:700;font-size:20px;font-family:var(--display)}
.sum.total span:last-child{color:var(--teal)}

@media(max-width:940px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:repeat(2,1fr)}.chips{grid-template-columns:repeat(3,1fr)}.statusLine{grid-template-columns:repeat(2,1fr)}.ticketRow{grid-template-columns:1fr}}
@media(max-width:640px){.topin{align-items:stretch;flex-direction:column}.tabs{display:grid;grid-template-columns:repeat(4,1fr)}.wrap{padding:16px 14px 40px}.grid3,.chips,.statusLine{grid-template-columns:1fr}.head,.foot{align-items:stretch;flex-direction:column}.drawer{display:none}.drawer.open{display:grid}.hamb{display:inline-flex}.liveStrip{gap:16px}}

/* ---- polish: ambient bg + entrance + logo shine + ripple (visual only, no logic changes) ---- */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-fx span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.14;background:radial-gradient(circle,var(--teal),transparent 70%);animation:drift 30s ease-in-out infinite}
.bg-fx span:nth-child(1){width:480px;height:480px;top:-160px;left:-120px}
.bg-fx span:nth-child(2){width:400px;height:400px;bottom:-140px;right:-100px;background:radial-gradient(circle,var(--accent2),transparent 70%);animation-duration:34s;animation-delay:-6s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.06)}}
.top,.wrap,main{position:relative;z-index:1}
@media(prefers-reduced-motion:reduce){.bg-fx span{animation:none}}
.mark{position:relative;overflow:hidden}
.mark::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.5),transparent);animation:shine 4.5s ease-in-out infinite}
@keyframes shine{0%{left:-60%}45%,100%{left:130%}}
.panel{animation:fadeUpPanel .6s cubic-bezier(.22,.9,.3,1) both}
@keyframes fadeUpPanel{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.rippleWrap{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);transform:scale(0);animation:rip .55s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(2.6);opacity:0}}
</style>
</head>
<body>
<div class="bg-fx"><span></span><span></span></div>
<div id="toast" class="toast"></div>
<header class="top"><div class="topin">
  <div class="brand" onclick="location.href='index.html'"><span class="mark">EP</span>Episkevi Admin</div>
  <a class="btn soft" href="index.html">&larr; Main app</a>
  <div class="sync"><span id="syncDot" class="dot"></span><span id="sync">Connecting</span></div>
</div></header>

<!-- ============ ADMIN ============ -->
<main id="admin" class="screen active"><div class="wrap">
  <section class="panel" id="adminLogin">
    <div class="head"><div><h2 class="title">Admin desk</h2><div class="sub">Enter the admin API key to open the console.</div></div></div>
    <div class="field"><label>Admin API key</label><input id="adminKey" type="password"></div>
    <button class="btn dark" onclick="adminLogin()">Open console</button>
  </section>
  <div id="adminDash" style="display:none">
    <section class="panel"><div class="statusLine">
      <div class="stat"><strong id="aCustomers">0</strong><span>Customers</span></div>
      <div class="stat"><strong id="aWorkers">0</strong><span>Workers</span></div>
      <div class="stat"><strong id="aPending">0</strong><span>Pending verification</span></div>
      <div class="stat"><strong id="aBookings">0</strong><span>Bookings</span></div>
    </div></section>
    <section class="panel"><div class="head"><div><h2 class="title">Live worker map</h2><div class="sub">Every worker's current position. Green = online, amber = busy, grey = offline.</div></div></div>
      <div id="adminMap" class="mapBox"></div>
    </section>
    <section class="panel"><div class="head"><div><h2 class="title">Worker applications</h2></div></div><div id="adminApps" class="list"></div></section>
    <section class="panel"><div class="head"><div><h2 class="title">Bookings</h2></div></div><div id="adminBookings" class="list"></div></section>
  </div>
</div></main>

<script>
try{sessionStorage.setItem("fixitSplashSeen","1")}catch(e){} // skip main-site splash if user lands here first

/* ---- tap feedback: haptic + click sound + ripple (visual only) ---- */
let __ac;
function __tone(){
  try{
    __ac=__ac||new (window.AudioContext||window.webkitAudioContext)();
    if(__ac.state==="suspended")__ac.resume();
    const t=__ac.currentTime,o=__ac.createOscillator(),g=__ac.createGain();
    o.type="sine";o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(560,t+.08);
    g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.0001,t+.09);
    o.connect(g);g.connect(__ac.destination);o.start(t);o.stop(t+.1);
  }catch(e){}
}
function __ripple(el,x,y){
  try{
    const r=document.createElement("span");r.className="ripple";
    const rect=el.getBoundingClientRect(),size=Math.max(rect.width,rect.height);
    r.style.width=r.style.height=size+"px";r.style.left=(x-rect.left-size/2)+"px";r.style.top=(y-rect.top-size/2)+"px";
    el.classList.add("rippleWrap");el.appendChild(r);setTimeout(()=>r.remove(),600);
  }catch(e){}
}
document.addEventListener("click",function(ev){
  const t=ev.target.closest("button,a.btn");
  if(!t)return;
  if(navigator.vibrate)navigator.vibrate(10);
  __tone();
  __ripple(t,ev.clientX||0,ev.clientY||0);
},true);

const qs=id=>document.getElementById(id);
const money=v=>"Rs. "+Number(v||0).toLocaleString("en-IN");
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
const AMBI={lat:23.1226,lng:83.1956};

let settings={};
let adminKey=localStorage.fixitAdminKey||"";
let adminMapObj=null,adminMapMarkers={};

async function api(p,o={}){let r=await fetch(p,o),d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.error||"API failed");return d}
function headers(admin=false){let h={"Content-Type":"application/json"};if(admin)h["x-api-key"]=adminKey;return h}
function toast(m){qs("toast").textContent=m;qs("toast").classList.add("show");setTimeout(()=>qs("toast").classList.remove("show"),2800)}

async function boot(){
  let d=await api("/api/bootstrap");
  settings=d.settings;
  qs("sync").textContent="Live";qs("syncDot").classList.add("live");
  if(adminKey)loadAdmin();
}
boot().catch(e=>toast(e.message));

/* ---- admin ---- */
async function adminLogin(){
  adminKey=qs("adminKey").value;localStorage.fixitAdminKey=adminKey;
  await api("/api/admin/login",{method:"POST",headers:headers(true),body:"{}"});
  loadAdmin();
}
async function loadAdmin(){
  let d=await api("/api/admin/dashboard",{headers:headers(true)});
  qs("adminLogin").style.display="none";qs("adminDash").style.display="block";
  qs("aCustomers").textContent=d.customers.length;qs("aWorkers").textContent=d.workers.length;
  qs("aPending").textContent=d.workerApplications.filter(a=>a.verificationStatus=="pending").length;
  qs("aBookings").textContent=d.bookings.length;
  qs("adminApps").innerHTML=d.workerApplications.length?d.workerApplications.map(a=>`<div class="card row"><div><div class="name">${esc(a.name)}</div><div class="meta">${esc(a.service)} · ${esc(a.email||"")} · ${esc(a.phone)} · ${esc(a.verificationStatus)}</div><a href="${esc(a.idUrl)}" target="_blank">View ID</a></div>${a.verificationStatus=="pending"?`<div><button class="btn primary" onclick="reviewApp(${a.id},'verify')">Verify</button> <button class="btn danger" onclick="reviewApp(${a.id},'reject')">Reject</button></div>`:""}</div>`).join(""):'<div class="empty">No applications</div>';
  qs("adminBookings").innerHTML=bookingCards(d.bookings);
  drawAdminMap(d.workers);
}
async function reviewApp(id,action){
  await api(`/api/admin/worker-applications/${id}/${action}`,{method:"POST",headers:headers(true),body:JSON.stringify({reason:"Documents not clear"})});
  toast("Application updated");loadAdmin();
}
function drawAdminMap(list){
  if(!adminMapObj){
    adminMapObj=L.map("adminMap").setView([AMBI.lat,AMBI.lng],12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"&copy; OpenStreetMap &copy; CARTO",subdomains:"abcd",maxZoom:19}).addTo(adminMapObj);
  }
  setTimeout(()=>adminMapObj.invalidateSize(),80);
  let seen=new Set();
  list.forEach(w=>{
    if(w.lat==null||w.lng==null)return;
    seen.add(w.id);
    let color=w.status=="Online"?"#0f7a6c":w.status=="Busy"?"#f2a71b":"#9aa4ad";
    let html=`<div style="background:${color};color:#fff;border-radius:50%;width:28px;height:28px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.3);font-size:11px;font-weight:800">${esc((w.name||"?").slice(0,1))}</div>`;
    let icon=L.divIcon({className:"",html,iconSize:[28,28],iconAnchor:[14,14]});
    if(adminMapMarkers[w.id]){adminMapMarkers[w.id].setLatLng([w.lat,w.lng]).setIcon(icon)}
    else{
      adminMapMarkers[w.id]=L.marker([w.lat,w.lng],{icon}).addTo(adminMapObj).bindPopup(`<b>${esc(w.name)}</b><br>${esc(w.service)} · ${esc(w.status)}`);
    }
  });
  Object.keys(adminMapMarkers).forEach(id=>{if(!seen.has(Number(id))){adminMapObj.removeLayer(adminMapMarkers[id]);delete adminMapMarkers[id]}});
}
function bookingCards(list){
  if(!list.length)return'<div class="empty">No bookings yet.</div>';
  return [...list].reverse().map(b=>`<article class="card"><div class="row"><div><div class="name">${esc(b.customerName)} - ${esc(b.service)}</div><div class="meta">${esc(b.customerAddress)} · ${esc(b.note||"")}</div><div class="tags"><span class="tag blue">${esc(b.status)}</span><span class="tag">${money(b.total)}</span></div></div></div></article>`).join("");
}
</script>
</body>
</html>
